{% extends 'base.html' %}
{% block title %}Agregar Producto{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">AGREGAR PRODUCTO 🔥</h1>
    <p class="page-subtitle">Añade nueva ropa al catálogo</p>
</div>

<div style="max-width:600px;">
    <div class="card">
        <form method="POST" action="{{ url_for('admin.agregar_producto') }}">
            <div class="form-group">
                <label class="form-label">Nombre del producto</label>
                <input type="text" name="nombre" class="form-control"
                    placeholder="ej. Hoodie Neon Dreams" required>
            </div>
            <div class="form-group">
                <label class="form-label">Categoría</label>
                <select name="categoria" class="form-control" required>
                    <option value="">Selecciona categoría…</option>
                    {% for val, label in categorias %}
                    <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label class="form-label">Precio (MXN)</label>
                    <input type="number" name="precio" class="form-control"
                        placeholder="350.00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Stock</label>
                    <input type="number" name="stock" class="form-control"
                        placeholder="10" min="0" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control"
                    placeholder="Describe el producto…"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">URL de imagen (opcional)</label>
                <input type="url" name="imagen_url" class="form-control"
                    placeholder="https://...">
            </div>
            <div style="display:flex;gap:1rem;margin-top:1rem;">
                <button type="submit" class="btn btn-primary">💾 Guardar</button>
                <a href="{{ url_for('admin.productos') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
